<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain - LLM Tokens Streaming</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>  
  <!-- 마크다운을 HTML로 변환하는 라이브러리-->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>  
  <link href="/static/common/css/ai-utils.css" rel="stylesheet" />
  <script src="/static/common/js/ai-utils.js"></script>
  <script>
    let currentConversationId = null;

    // 페이지 로드 시 실행
    window.onload = function() {
      // 로컬 스토리지에서 conversation_id 불러오기 (있으면)
      const savedConversationId = localStorage.getItem('conversation_id');
      if (savedConversationId) {
        currentConversationId = savedConversationId;
        document.getElementById("conversationId").value = currentConversationId;
        loadHistory(); // 기존 대화 기록 로드
      } else {
        generateNewConversationId();
      }
    };

    // 새 대화 ID 생성
    function generateNewConversationId() {
      currentConversationId = 'conv_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      document.getElementById("conversationId").value = currentConversationId;
      localStorage.setItem('conversation_id', currentConversationId);
      document.getElementById("chatPanel").innerHTML = '';
    }

    // 대화 ID 변경
    function changeConversationId() {
      const conversationInput = document.getElementById("conversationId");
      const newConversationId = conversationInput.value.trim();
      
      if (newConversationId === "") {
        alert("대화 ID를 입력하세요");
        return;
      }
      
      if (newConversationId === currentConversationId) {
        return; // 같은 ID면 아무것도 하지 않음
      }
      
      currentConversationId = newConversationId;
      localStorage.setItem('conversation_id', currentConversationId);
      document.getElementById("chatPanel").innerHTML = '';
      loadHistory(); // 새 대화의 기록 로드
    }

    // 대화 기록 로드
    async function loadHistory() {
      try {
        const response = await fetch(`/sec06/get-history-inmemory?conversation_id=${currentConversationId}`);
        const data = await response.json();
        
        if (data.messages && data.messages.length > 0) {
          document.getElementById("chatPanel").innerHTML = '';
          data.messages.forEach(msg => {
            if (msg.type === 'human') {
              ai_utils.addUserQuestion(msg.content, "chatPanel");
            } else if (msg.type === 'ai') {
              const uuid = ai_utils.addAnswerPlaceHolder("chatPanel");
              document.getElementById(uuid).innerHTML = marked.parse(msg.content);
            }
          });
          ai_utils.scrollToHeight("chatPanel");
        }
      } catch (error) {
        console.error("대화 기록 로드 실패:", error);
      }
    }

    // 메시지 전송
    async function sendMessage() {
      try {
        const message = document.getElementById("message").value;
        if (message === "") return;

        // 사용자 메시지 표시
        ai_utils.addUserQuestion(message, "chatPanel");
        document.getElementById("message").value = "";

        // 스피너 표시
        ai_utils.setSpinner("spinner", true);

        // API 호출
        const response = await fetch('/sec06/chat-history-inmemory', {
          method: "POST",
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'Accept': 'text/plain'
          },
          body: new URLSearchParams({
            message: message,
            conversation_id: currentConversationId
          })
        });

        // AI 응답 스트리밍 출력
        const uuid = ai_utils.addAnswerPlaceHolder("chatPanel");
        ai_utils.printAnswerText(response, uuid, "chatPanel");

      } catch (error) {
        console.error(error);
        alert("오류가 발생했습니다: " + error.message);
      } finally {
        ai_utils.setSpinner("spinner", false);
      }
    }

    // Enter 키로 전송
    function handleKeyPress(event) {
      // Enter+Shift: 줄 바꿈
      // Enter: 요청
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    // 대화 기록 초기화
    async function clearHistory() {
      if (!confirm("현재 대화 기록을 모두 삭제하시겠습니까?")) {
        return;
      }

      try {
        ai_utils.setSpinner("spinner", true);

        const response = await fetch('/sec06/clear-history-inmemory', {
          method: "POST",
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
          },
          body: new URLSearchParams({
            conversation_id: currentConversationId
          })
        });

        const data = await response.json();
        alert(data.message);
        
        // 채팅 패널 초기화
        document.getElementById("chatPanel").innerHTML = '';

      } catch (error) {
        console.error(error);
        alert("오류가 발생했습니다: " + error.message);
      } finally {
        ai_utils.setSpinner("spinner", false);
      }
    }

    // 샘플 질문 입력
    function sendSampleQuestion(question) {
      document.getElementById("message").value = question;
    }
  </script>
</head>

<body>
  <div class="d-flex flex-column vh-100">
    <div id="headPanel" class="navbar justify-content-between">
      <a href="/" class="navbar-brand ps-2">
        <img src="/static/common/image/langchain_logo.png" width="200" />
      </a>
      <div id="spinner" class="spinner-border text-success d-none me-3" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <div class="container-fluid flex-grow-1 d-flex flex-column" style="overflow: hidden;">
      <!-- 대화 ID 관리 영역 -->
      <div class="row mt-3">
        <div class="col">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">대화 관리</h5>
              <div class="row g-2">
                <div class="col-md-8">
                  <input type="text" class="form-control" id="conversationId" placeholder="대화 ID">
                </div>
                <div class="col-md-4">
                  <button class="btn btn-primary me-2" onclick="changeConversationId()">대화 전환</button>
                  <button class="btn btn-success me-2" onclick="generateNewConversationId()">새 대화</button>
                  <button class="btn btn-danger" onclick="clearHistory()">기록 삭제</button>
                </div>
              </div>
              <small class="text-muted">대화 ID를 입력하고 '대화 전환' 버튼을 누르면 해당 대화로 이동합니다.</small>
            </div>
          </div>
        </div>
      </div>

      <!-- 채팅 패널 -->
      <div class="row flex-grow-1 mt-3" style="overflow: hidden;">
        <div class="col h-100">
          <div class="card h-100 d-flex flex-column">
            <div class="card-header bg-primary text-white">
              <h5 class="mb-0">메모리 기반 채팅</h5>
            </div>
            <div class="card-body flex-grow-1" id="chatPanel" style="overflow-y: auto;">
              <!-- 채팅 메시지가 여기에 표시됩니다 -->
            </div>
          </div>
        </div>
      </div>

      <!-- 샘플 질문 버튼 -->
      <div class="row mt-3">
        <div class="col">
          <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm" onclick="sendSampleQuestion('너의 이름을 자비스로하자')">
              💬 너의 이름을 자비스로하자
            </button>
            <button class="btn btn-outline-secondary btn-sm" onclick="sendSampleQuestion('너의 이름은 뭐야?')">
              💬 너의 이름은 뭐야?
            </button>
          </div>
        </div>
      </div>

      <!-- 입력 영역 -->
      <div class="row mt-2 mb-3">
        <div class="col">
          <div class="input-group">
            <textarea 
              class="form-control" 
              id="message" 
              rows="2" 
              placeholder="메시지를 입력하세요 (예: 안녕? 내 이름은 철수야)"
              onkeypress="handleKeyPress(event)"
            ></textarea>
            <button class="btn btn-primary" type="button" onclick="sendMessage()">전송</button>
          </div>
          <small class="text-muted">Enter: 전송 | Shift+Enter: 줄바꿈</small>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
