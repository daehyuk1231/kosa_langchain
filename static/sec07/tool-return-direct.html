<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain Tool Calling - Return Direct</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="/static/common/css/ai-utils.css" rel="stylesheet" />
  <script src="/static/common/js/ai-utils.js"></script>
  <script>
    // ##### 제출 버튼을 클릭했을 때 실행하는 함수 #####
    async function handleSubmit() {
      try {
        // 텍스트 질문을 얻고 대화 패널에 추가하기
        const question = document.getElementById("question").value;
        if (question === "") return;
        ai_utils.addUserQuestion(question, "chatPanel");

        // 응답이 오기까지 스피너 보여주기
        ai_utils.setSpinner("spinner", true);

				// AJAX 요청하고 응답받기
				const response = await fetch('/sec07/tool-return-direct', {
				  method: "post",
					headers: {
					  'Content-Type': 'application/x-www-form-urlencoded',
					  'Accept': 'text/plain'
					},					
				  body: new URLSearchParams({ question })
				});

        // AI 모델 답변이 들어갈 위치를 대화 패널에 추가
        const uuid = ai_utils.addAnswerPlaceHolder("chatPanel");
        
        // 텍스트 답변 출력하기
        await ai_utils.printAnswerText(response, uuid, "chatPanel");
      } catch (error) {
        console.log(error);
      } finally {
        //스피너 숨기기
        ai_utils.setSpinner("spinner", false);
      }
    } 
  </script>
</head>

<body>
  <div class="d-flex flex-column vh-100">
    <div id="headPanel" class="navbar justify-content-between">
      <a href="/" class="navbar-brand ps-2">
        <img src="/static/common/image/langchain_logo.png" width="200" />
      </a>
      <div id="spinner" class="spinner-border text-success d-none me-3" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <div id="chatPanel" class="flex-grow-1 container-fluid h-100 my-2" style="overflow-y:auto; overflow-x:hidden;">
      <div class="d-flex justify-content-start border-bottom m-2">
        <table>
          <tr>
            <td><img src="/static/common/image/assistant.png" width="50" /></td>
            <td>
              <div>
                <strong>Return Direct Tool (@tool(return_direct=True))</strong>
              </div>
              <div class="text-muted small">
                Tool의 결과를 LLM을 거치지 않고 직접 반환하는 예제입니다.<br>
                @tool(return_direct=True) 데코레이터를 사용하면 Tool의 출력이 최종 응답이 됩니다.
              </div>
            </td>
          </tr>
        </table>
      </div>
    </div>

    <div id="inputPanel" class="bg-secondary-subtle">
      <div class="input-group p-2">
        <span class="input-group-text">질문</span>
        <input id="question" type="text" class="form-control" value="blueskii가 좋아할만한 영화를 추천해줘."
               onkeypress="if(event.key === 'Enter') handleSubmit();"/>
        <span class="input-group-text">
          <button type="button" class="btn btn-primary" onclick="handleSubmit()">제출</button>
        </span>
      </div>
    </div>
  </div>
</body>

</html>
