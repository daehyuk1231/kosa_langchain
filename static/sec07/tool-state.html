<!DOCTYPE html>
<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain Tool Calling</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="/static/common/css/ai-utils.css" rel="stylesheet" />
  <script src="/static/common/js/ai-utils.js"></script>
  <script>
    // ##### 제출 버튼을 클릭했을 때 실행하는 함수 #####
    async function handleSubmit() {
      try {
        // 텍스트 질문을 얻고 대화 패널에 추가하기
        const question = document.getElementById("question").value;
        const userId = document.getElementById("userId").value;
        
        if (question === "") return;
        ai_utils.addUserQuestion(question, "chatPanel");

        // 응답이 오기까지 스피너 보여주기
        ai_utils.setSpinner("spinner", true);

				// AJAX 요청하고 응답받기
				const response = await fetch('/sec07/tool-state', {
          method: "post",
					headers: {
					  'Content-Type': 'application/x-www-form-urlencoded',
					  'Accept': 'text/plain'
					},					
				  body: new URLSearchParams({ 
            question,
            user_id: userId
          })
				});

        // AI 모델 답변이 들어갈 위치를 대화 패널에 추가
        const uuid = ai_utils.addAnswerPlaceHolder("chatPanel");
        
        // 텍스트 답변 출력하기
        ai_utils.printAnswerText(response, uuid, "chatPanel");
      } catch (error) {
        console.log(error);
      } finally {
        //스피너 숨기기
        ai_utils.setSpinner("spinner", false);
      }
    } 
  </script>
</head>

<body>
  <div class="d-flex flex-column vh-100">
    <div id="headPanel" class="navbar justify-content-between">
      <a href="/" class="navbar-brand ps-2">
        <img src="/static/common/image/langchain_logo.png" width="200" />
      </a>
      <div id="spinner" class="spinner-border text-success d-none me-3" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <div id="chatPanel" class="flex-grow-1 container-fluid h-100 my-2" style="overflow-y:auto; overflow-x:hidden;">
      <div class="d-flex justify-content-start border-bottom m-2">
        <table>
          <tr>
            <td><img src="/static/common/image/assistant.png" width="50" /></td>
            <td><span>질문을 올려주세요.</span></td>
          </tr>
        </table>
      </div>
    </div>

    <div id="inputPanel" class="bg-secondary-subtle">
      <!-- 사용자 선택 -->
      <div class="container-fluid p-2 border-bottom">
        <div class="input-group input-group-sm">
          <span class="input-group-text">사용자</span>
          <select id="userId" class="form-select">
            <option value="user1" selected>user1 (관리자 - 전체 권한)</option>
            <option value="user2">user2 (일반 사용자 - 읽기/작성 권한)</option>
            <option value="user3">user3 (방문자 - 읽기만)</option>
          </select>
        </div>
      </div>

      <!-- 샘플 질문 버튼 -->
      <div class="container-fluid p-2 border-bottom">
        <div class="small text-muted mb-1">샘플 질문:</div>
        <button type="button" class="btn btn-sm btn-outline-secondary me-2" onclick="document.getElementById('question').value='파일을 읽어주세요'">파일을 읽어주세요</button>
        <button type="button" class="btn btn-sm btn-outline-secondary me-2" onclick="document.getElementById('question').value='파일을 작성해 주세요'">파일을 작성해 주세요</button>
        <button type="button" class="btn btn-sm btn-outline-secondary me-2" onclick="document.getElementById('question').value='파일을 삭제해 주세요'">파일을 삭제해 주세요</button>
      </div>
      
      <div class="input-group p-2">
        <span class="input-group-text">질문</span>
        <input id="question" type="text" class="form-control" value="파일을 읽어주세요">
        <span class="input-group-text">
          <button type="button" class="btn btn-primary" onclick="handleSubmit()">제출</button>
        </span>
      </div>
    </div>
  </div>
</body>

</html>
