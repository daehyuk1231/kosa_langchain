<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고객 지원 Multi-Agent</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="/static/common/css/ai-utils.css" rel="stylesheet" />
  <script src="/static/common/js/ai-utils.js"></script>
  <script>
    // ##### 제출 버튼을 클릭했을 때 실행하는 함수 #####
    async function handleSubmit() {
      try {
        // 텍스트 질문을 얻고 대화 패널에 추가하기
        const inquiry = document.getElementById("inquiry").value;
        if (inquiry === "") return;
        
        ai_utils.addUserQuestion(inquiry, "chatPanel");

        // 응답이 오기까지 스피너 보여주기
        ai_utils.setSpinner("spinner", true);

        // AJAX 요청하고 응답받기
        const response = await fetch('/sec09/customer-support', {
          method: "post",
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'Accept': 'text/plain'
          },         
          body: new URLSearchParams({ inquiry })
        });

        // AI 모델 답변이 들어갈 위치를 대화 패널에 추가
        const uuid = ai_utils.addAnswerPlaceHolder("chatPanel");
        
        // 텍스트 답변 출력하기
        ai_utils.printAnswerText(response, uuid, "chatPanel");
        
        // 입력 필드 초기화
        document.getElementById("inquiry").value = "";
      } catch (error) {
        console.log(error);
      } finally {
        // 스피너 숨기기
        ai_utils.setSpinner("spinner", false);
      }
    }
    
    // 예제 질문 클릭 시 입력 필드에 자동 입력
    function setExample(text) {
      document.getElementById("inquiry").value = text;
    }
  </script>
</head>

<body>
  <div class="d-flex flex-column vh-100">
    <div id="headPanel" class="navbar justify-content-between">
      <a href="/" class="navbar-brand ps-2">
        <img src="/static/common/image/langchain_logo.png" width="200" />
      </a>
      <div id="spinner" class="spinner-border text-success d-none me-3" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <div id="chatPanel" class="flex-grow-1 container-fluid h-100 my-2" style="overflow-y:auto; overflow-x:hidden;">
      <div class="d-flex justify-content-start border-bottom m-2">
        <table>
          <tr>
            <td><img src="/static/common/image/assistant.png" width="50" /></td>
            <td>
              <div>
                <p><strong>🤖 고객 지원 Multi-Agent 시스템</strong></p>
                <p>
                  고객 문의를 Multi-Agent 시스템으로 처리합니다.<br/>
                  <strong>Step 1</strong>: 문의 분석 (단독 실행)<br/>
                  <strong>Step 2</strong>: 사용자 정보 + 지식 베이스 검색 (병렬 실행, 분석 결과 활용)<br/>
                  <strong>Step 3</strong>: 문의 유형에 따라 전문 Agent 선택 (조건분기)
                </p>
                
                <div class="mt-3">
                  <strong>예제 질문:</strong><br/>
                  <button class="btn btn-outline-primary btn-sm m-1" onclick="setExample('제품이 작동하지 않아요. 어떻게 해야 하나요?')">
                    🔧 기술 지원
                  </button>
                  <button class="btn btn-outline-success btn-sm m-1" onclick="setExample('주문한 상품이 언제 도착하나요?')">
                    📦 주문/배송
                  </button>
                  <button class="btn btn-outline-danger btn-sm m-1" onclick="setExample('구매한 제품 환불하고 싶어요.')">
                    💰 환불/교환
                  </button>
                  <button class="btn btn-outline-warning btn-sm m-1" onclick="setExample('비밀번호를 잊어버렸어요.')">
                    👤 계정 관리
                  </button>
                  <button class="btn btn-outline-info btn-sm m-1" onclick="setExample('영업시간이 어떻게 되나요?')">
                    💬 일반 문의
                  </button>
                </div>
              </div>
            </td>
          </tr>
        </table>
      </div>
    </div>

    <div id="inputPanel" class="bg-secondary-subtle">
      <div class="input-group p-2">
        <span class="input-group-text">문의</span>
        <input id="inquiry" type="text" class="form-control" placeholder="고객 문의 내용을 입력하세요...">
        <span class="input-group-text">
          <button type="button" class="btn btn-primary" onclick="handleSubmit()">제출</button>
        </span>
      </div>
    </div>
  </div>
</body>

</html>
